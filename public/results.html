<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funnly — Resultados</title>
<script>if(localStorage.getItem('funnly-theme')==='dark')document.body.classList.add('dark')</script>
<script src="/api/env"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --ink:    #0f0a1e;
    --paper:  #f9f7ff;
    --accent: #a855f7;
    --soft:   #f3ebff;
    --muted:  #9d8fb0;
    --border: #e8e0f5;
    --danger: #e5484d;
    --success:#22c55e;
    --cta:    #fb923c;
    --radius: 12px;
    --sidebar-w: 240px;
  }
  body.dark {
    --ink:     #f0ecff; --paper:   #0a0a0f; --surface: #110d1f;
    --accent:  #a855f7; --glow:    #c084fc; --soft:    #1a1030;
    --muted:   #7c6f9a; --border:  #1e1a2e; --danger:  #f87171; --success: #4ade80;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; transition: background .2s, color .2s; }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w); background: var(--surface, #fff);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; left: 0; top: 0; bottom: 0; z-index: 50;
  }
  .sidebar-logo { padding: 20px; display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 20px; color: var(--accent); letter-spacing: -.5px; border-bottom: 1px solid var(--border); text-decoration: none; }
  .sidebar-logo svg { width: 28px; height: 28px; flex-shrink: 0; }
  .sidebar-nav { flex: 1; padding: 16px 12px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 14px; color: var(--muted); cursor: pointer; text-decoration: none; margin-bottom: 2px; transition: all .15s; }
  .nav-item:hover { background: var(--paper); color: var(--ink); }
  .nav-item.active { background: var(--soft); color: var(--accent); font-weight: 500; }
  .nav-icon { font-size: 16px; width: 22px; text-align: center; }

  /* MAIN */
  .main { margin-left: var(--sidebar-w); flex: 1; padding: 40px 48px; }
  .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
  .page-header h1 { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
  .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn-sm {
    padding: 9px 18px; border-radius: 8px;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--ink); transition: all .15s;
  }
  .btn-sm:hover { background: var(--paper); }
  .btn-sm.primary { background: var(--cta); color: #fff; border-color: transparent; box-shadow: 0 2px 10px rgba(251,146,60,.3); }
  .btn-sm.primary:hover { opacity: .9; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--surface, #fff); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value { font-size: 30px; font-weight: 800; letter-spacing: -1px; }
  .stat-value.accent { color: var(--accent); }

  /* TABLE */
  .table-wrap { background: var(--surface, #fff); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: left; padding: 12px 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border); background: #fafafa; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody td { padding: 14px 20px; font-size: 14px; color: var(--ink); }
  .lead-name { font-weight: 500; }
  .lead-muted { color: var(--muted); font-size: 13px; }
  .answers-preview { display: flex; flex-wrap: wrap; gap: 4px; }
  .ans-tag { background: var(--paper); color: var(--muted); font-size: 11px; padding: 3px 8px; border-radius: 4px; }
  .btn-row { display: flex; gap: 8px; }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 6px; transition: color .15s; }
  .icon-btn:hover { color: var(--accent); }
  .completed-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 50px; background: #d1fae5; color: #065f46; }
  .partial-badge   { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 50px; background: #fef3c7; color: #92400e; }

  /* LOADING */
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 10px; color: var(--muted); }

  /* DETAIL MODAL */
  .modal-overlay { position: fixed; inset: 0; z-index: 999; background: rgba(13,13,18,.6); backdrop-filter: blur(8px); display: none; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface, #fff); border-radius: 20px; padding: 32px; width: 100%; max-width: 560px; box-shadow: 0 24px 80px rgba(0,0,0,.2); animation: slideUp .25s cubic-bezier(.16,1,.3,1); }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .modal-head h3 { font-size: 20px; font-weight: 800; }
  .modal-close { background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; }
  .respondent-info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .info-field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); display: block; margin-bottom: 4px; }
  .info-field span  { font-size: 14px; font-weight: 500; }
  .answers-list { display: flex; flex-direction: column; gap: 16px; }
  .answer-item { }
  .answer-q { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .answer-v { font-size: 15px; font-weight: 500; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 24px 20px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <a href="/dashboard.html" class="sidebar-logo">
    <svg viewBox="0 0 52 52" fill="none">
      <rect x="4" y="5" width="44" height="9" rx="4.5" fill="#a855f7"/>
      <rect x="10" y="18" width="32" height="8" rx="4" fill="#a855f7" opacity="0.65"/>
      <rect x="18" y="30" width="16" height="7" rx="3.5" fill="#a855f7" opacity="0.4"/>
      <path d="M22 40 L26 47 L30 40" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    funnly
  </a>
  <nav class="sidebar-nav">
    <a href="/dashboard.html" class="nav-item"><span class="nav-icon"><i data-lucide="layout-grid" style="width:17px;height:17px"></i></span> Meus quizzes</a>
    <a href="/integrations.html" class="nav-item"><span class="nav-icon"><i data-lucide="plug" style="width:17px;height:17px"></i></span> Integrações</a>
    <a href="/settings.html" class="nav-item"><span class="nav-icon"><i data-lucide="settings" style="width:17px;height:17px"></i></span> Configurações</a>
  </nav>
  <div class="sidebar-footer" style="padding:16px 12px;border-top:1px solid var(--border);">
    <a href="/settings.html" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;text-decoration:none;transition:background .15s;" onmouseover="this.style.background='var(--paper)'" onmouseout="this.style.background=''">
      <div class="avatar" id="user-avatar" style="width:34px;height:34px;border-radius:50%;background:var(--soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;">?</div>
      <div style="flex:1;min-width:0;">
        <div id="user-name" style="font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Carregando...</div>
        <div id="user-email" style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
      </div>
    </a>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="page-header">
    <button onclick="window.location.href='/dashboard.html'" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px">←</button>
    <h1 id="page-title">Carregando...</h1>
    <div class="header-actions">
      <button class="btn-sm" onclick="copyQuizLink()" style="display:flex;align-items:center;gap:6px"><i data-lucide="link" style="width:14px;height:14px"></i> Copiar link</button>
      <button class="btn-sm primary" onclick="exportCSV()" style="display:flex;align-items:center;gap:6px"><i data-lucide="download" style="width:14px;height:14px"></i> Exportar CSV</button>
    </div>
  </div>
  <p class="page-sub" id="page-sub"></p>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total de respostas</div><div class="stat-value accent" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Concluídas</div><div class="stat-value" id="stat-completed">—</div></div>
    <div class="stat-card"><div class="stat-label">Taxa de conclusão</div><div class="stat-value" id="stat-rate">—</div></div>
    <div class="stat-card"><div class="stat-label">Última resposta</div><div class="stat-value" style="font-size:16px" id="stat-last">—</div></div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">Leads captados</div>
      <div style="font-size:13px;color:var(--muted)" id="table-count"></div>
    </div>
    <div id="table-body">
      <div class="loading-state"><div class="spinner"></div> Carregando...</div>
    </div>
  </div>
</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal" onclick="closeDetailOutside(event)">
  <div class="modal">
    <div class="modal-head">
      <h3>Detalhes da resposta</h3>
      <button class="modal-close" onclick="closeDetail()"><i data-lucide="x" style="width:16px;height:16px"></i></button>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<script>
  let supabase   = null;
  let currentUser= null;
  let quizId     = null;
  let quizData   = null;
  let questions  = [];
  let responses  = [];

  async function initSupabase() {
    if (supabase) return supabase;
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    supabase = createClient(window.__env?.SUPABASE_URL || '', window.__env?.SUPABASE_ANON_KEY || '');
    return supabase;
  }

  (async () => {
    const sb = await initSupabase();
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '/'; return; }
    currentUser = session.user;
    const name = currentUser.user_metadata?.display_name || currentUser.email.split('@')[0];
    const avatarEl = document.getElementById('user-avatar');
    const nameEl = document.getElementById('user-name');
    const emailEl = document.getElementById('user-email');
    if (avatarEl) avatarEl.textContent = name.charAt(0).toUpperCase();
    if (nameEl) nameEl.textContent = name;
    if (emailEl) emailEl.textContent = currentUser.email;
    quizId = new URLSearchParams(location.search).get('id');
    if (!quizId) { window.location.href = '/dashboard.html'; return; }
    await loadData();
  })();

  async function loadData() {
    const sb = await initSupabase();
    // Load quiz
    const { data: q } = await sb.from('quizzes').select('*').eq('id', quizId).eq('user_id', currentUser.id).single();
    if (!q) { window.location.href = '/dashboard.html'; return; }
    quizData = q;
    document.getElementById('page-title').textContent = q.title;
    document.getElementById('page-sub').textContent   = `/${q.slug}  ·  ${q.status === 'published' ? '● Publicado' : '○ Rascunho'}`;

    // Load questions
    const { data: qs } = await sb.from('questions').select('*').eq('quiz_id', quizId).order('position');
    questions = qs || [];

    // Load responses with answers
    const { data: rs } = await sb
      .from('responses')
      .select('*, answers(*)')
      .eq('quiz_id', quizId)
      .order('created_at', { ascending: false });
    responses = rs || [];

    renderStats();
    renderTable();
  }

  function renderStats() {
    const total     = responses.length;
    const completed = responses.filter(r => r.completed_at).length;
    const rate      = total > 0 ? Math.round(100 * completed / total) : 0;
    const last      = responses[0]?.created_at;
    document.getElementById('stat-total').textContent    = total;
    document.getElementById('stat-completed').textContent= completed;
    document.getElementById('stat-rate').textContent     = rate + '%';
    document.getElementById('stat-last').textContent     = last ? formatDate(last) : '—';
    document.getElementById('table-count').textContent   = `${responses.length} registros`;
  }

  function renderTable() {
    const body = document.getElementById('table-body');
    if (!responses.length) {
      body.innerHTML = `<div class="loading-state" style="flex-direction:column;gap:8px"><svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--muted)"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><div>Nenhuma resposta ainda.</div></div>`;
      return;
    }
    body.innerHTML = `<table>
      <thead><tr>
        <th>Nome</th><th>E-mail</th><th>Telefone</th>
        <th>Respostas</th><th>Status</th><th>Data</th><th></th>
      </tr></thead>
      <tbody>
        ${responses.map(r => {
          const re = r.respondent || {};
          const ansCount = (r.answers || []).length;
          const badge = r.completed_at
            ? `<span class="completed-badge">Concluído</span>`
            : `<span class="partial-badge">Parcial</span>`;
          return `<tr>
            <td><div class="lead-name">${escHtml(re.name || '—')}</div></td>
            <td><div class="lead-muted">${escHtml(re.email || '—')}</div></td>
            <td><div class="lead-muted">${escHtml(re.phone || '—')}</div></td>
            <td><div class="lead-muted">${ansCount} respostas</div></td>
            <td>${badge}</td>
            <td><div class="lead-muted">${formatDate(r.created_at)}</div></td>
            <td>
              <div class="btn-row">
                <button class="icon-btn" onclick="showDetail('${r.id}')" title="Ver detalhes"><svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  }

  // ── Detail ─────────────────────────────────────────────────
  function showDetail(id) {
    const r  = responses.find(r => r.id === id);
    if (!r) return;
    const re = r.respondent || {};
    const qMap = Object.fromEntries(questions.map(q => [q.id, q]));

    document.getElementById('detail-content').innerHTML = `
      <div class="respondent-info">
        <div class="info-field"><label>Nome</label><span>${escHtml(re.name || '—')}</span></div>
        <div class="info-field"><label>E-mail</label><span>${escHtml(re.email || '—')}</span></div>
        <div class="info-field"><label>Telefone</label><span>${escHtml(re.phone || '—')}</span></div>
        <div class="info-field"><label>Data</label><span>${formatDate(r.created_at)}</span></div>
        ${r.utm_source ? `<div class="info-field"><label>UTM Source</label><span>${escHtml(r.utm_source)}</span></div>` : ''}
        ${r.utm_campaign ? `<div class="info-field"><label>UTM Campaign</label><span>${escHtml(r.utm_campaign)}</span></div>` : ''}
      </div>
      <div class="answers-list">
        ${(r.answers||[]).map(a => {
          const q = qMap[a.question_id];
          if (!q) return '';
          let val;
          try { val = JSON.parse(a.value); } catch { val = a.value; }
          return `
            <div class="answer-item">
              <div class="answer-q">${escHtml(q.title || 'Pergunta')}</div>
              <div class="answer-v">${Array.isArray(val) ? val.join(', ') : escHtml(String(val))}</div>
            </div>`;
        }).join('')}
      </div>`;
    document.getElementById('detail-modal').classList.add('open');
  }

  function closeDetail() { document.getElementById('detail-modal').classList.remove('open'); }
  function closeDetailOutside(e) { if (e.target.id === 'detail-modal') closeDetail(); }

  // ── Export CSV ─────────────────────────────────────────────
  function exportCSV() {
    const headers = ['Nome', 'E-mail', 'Telefone', 'Status', 'Data', ...questions.map(q => q.title)];
    const qMap    = Object.fromEntries(questions.map(q => [q.id, q]));
    const rows    = responses.map(r => {
      const re = r.respondent || {};
      const ansMap = Object.fromEntries((r.answers||[]).map(a => [a.question_id, a.value]));
      const base = [
        re.name || '', re.email || '', re.phone || '',
        r.completed_at ? 'Concluído' : 'Parcial',
        formatDate(r.created_at),
      ];
      const ans = questions.map(q => {
        try { const v = JSON.parse(ansMap[q.id] || '""'); return Array.isArray(v) ? v.join('; ') : String(v); }
        catch { return ansMap[q.id] || ''; }
      });
      return [...base, ...ans];
    });

    const csvContent = [headers, ...rows]
      .map(row => row.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(','))
      .join('\n');

    const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `leads-${quizData?.slug || 'quiz'}-${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }

  // ── Share link ─────────────────────────────────────────────
  function copyQuizLink() {
    const url = `${location.origin}/q/${quizData?.slug}`;
    navigator.clipboard.writeText(url).then(() => alert('Link copiado!\n' + url));
  }

  // ── Helpers ────────────────────────────────────────────────
  function escHtml(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  }
</script>
</body>
</html>
